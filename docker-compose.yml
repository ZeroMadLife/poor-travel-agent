# TourSwarm 开发环境编排
# 启动：docker compose up -d
# 说明：MCP Server 与 Agent 在宿主机运行，此处仅编排基础设施

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tourswarm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tourswarm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tourswarm_dev}
      POSTGRES_DB: ${POSTGRES_DB:-tourswarm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tourswarm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: tourswarm-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  searxng:
    image: searxng/searxng:2026.7.15-5cb4cb2bc
    container_name: sage-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SAGE_SEARXNG_PORT:-8088}:8080"
    environment:
      SEARXNG_BASE_URL: http://127.0.0.1:${SAGE_SEARXNG_PORT:-8088}/
      SEARXNG_BIND_ADDRESS: 0.0.0.0
      SEARXNG_PORT: 8080
      SEARXNG_SECRET: ${SAGE_SEARXNG_SECRET:-sage-local-search-not-for-production}
    volumes:
      - ./infra/dev/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng_data:/var/cache/searxng
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  searxng_data:
